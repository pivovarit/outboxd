<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#336791"/>
      <stop offset="100%" stop-color="#264d6b"/>
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5ba0d0"/>
      <stop offset="100%" stop-color="#88c8e8"/>
    </linearGradient>
    <linearGradient id="streamGrad1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5ba0d0" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#88c8e8" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="streamGrad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5ba0d0" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#88c8e8" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Box (outbox) - isometric-style open box -->
  <!-- Back face -->
  <path d="M 100 160 L 240 100 L 240 300 L 100 360 Z" fill="url(#boxGrad)" opacity="0.85"/>
  <!-- Left face -->
  <path d="M 100 160 L 240 100 L 160 140 L 40 200 Z" fill="#3d7aaa" opacity="0.6"/>
  <!-- Bottom face -->
  <path d="M 100 360 L 240 300 L 240 300 L 100 360 Z" fill="#264d6b"/>

  <!-- Box - front left wall -->
  <path d="M 40 200 L 40 400 L 100 360 L 100 160 Z" fill="url(#boxGrad)"/>
  <!-- Box - bottom -->
  <path d="M 40 400 L 240 340 L 240 300 L 100 360 Z" fill="#264d6b" opacity="0.9"/>
  <!-- Box - front right wall (shorter - open top effect) -->
  <path d="M 240 300 L 240 340 L 40 400 L 40 400 Z" fill="#1d3d54" opacity="0.5"/>

  <!-- Back wall visible inside -->
  <path d="M 40 200 L 240 140 L 240 300 L 100 360 L 40 400 Z" fill="#2a5a80" opacity="0.3"/>

  <!-- Open flap (lid) - angled back to show "open" -->
  <path d="M 40 200 L 160 140 L 260 95 L 240 140 Z" fill="#3d7aaa" opacity="0.7"/>
  <path d="M 160 140 L 260 95 L 264 92" fill="none" stroke="#5ba0d0" stroke-width="1.5" opacity="0.5"/>

  <!-- Streaming arrows coming out of the box -->
  <!-- Main arrow -->
  <g>
    <!-- Arrow body 1 (top stream) -->
    <path d="M 200 190 C 280 170, 320 160, 400 150" fill="none" stroke="url(#arrowGrad)" stroke-width="14" stroke-linecap="round"/>
    <!-- Arrowhead 1 -->
    <polygon points="400,130 440,150 400,170" fill="#88c8e8"/>

    <!-- Arrow body 2 (middle stream) -->
    <path d="M 210 240 C 290 230, 330 225, 400 220" fill="none" stroke="url(#streamGrad1)" stroke-width="10" stroke-linecap="round"/>
    <!-- Arrowhead 2 -->
    <polygon points="400,205 430,220 400,235" fill="#88c8e8" opacity="0.7"/>

    <!-- Arrow body 3 (bottom stream) -->
    <path d="M 215 285 C 290 280, 340 280, 400 280" fill="none" stroke="url(#streamGrad2)" stroke-width="7" stroke-linecap="round"/>
    <!-- Arrowhead 3 -->
    <polygon points="400,269 422,280 400,291" fill="#88c8e8" opacity="0.45"/>
  </g>


  <!-- Wordmark -->
  <text x="256" y="470" text-anchor="middle" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace" font-size="56" font-weight="700" letter-spacing="4">
    <tspan fill="#336791">outbox</tspan><tspan fill="#5ba0d0">d</tspan>
  </text>
</svg>
