<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="100%" stop-color="#1b2d3e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern for texture -->
  <g opacity="0.03" stroke="white" stroke-width="0.5">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- Project name: use a clip to color just the last character -->
  <!-- Base text in white -->
  <text id="title" x="640" y="298" text-anchor="middle" font-family="monospace" font-size="86" font-weight="700" letter-spacing="6" fill="#e8f0f8">outboxd</text>

  <!-- Accent rectangle covering the rightmost ~1/7 of the text, clipped to text shape -->
  <clipPath id="textClip">
    <text x="640" y="298" text-anchor="middle" font-family="monospace" font-size="86" font-weight="700" letter-spacing="6">outboxd</text>
  </clipPath>
  <rect x="785" y="220" width="200" height="120" fill="#5ba0d0" clip-path="url(#textClip)"/>

  <!-- Tagline -->
  <text x="640" y="380" text-anchor="middle" font-family="monospace" font-size="21" fill="#5ba0d0" opacity="0.6" letter-spacing="3">Transactional Outbox Relay for PostgreSQL</text>
</svg>
